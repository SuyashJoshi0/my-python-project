version: 2.1

jobs:
  test-python:
    docker:
      - image: cimg/python:3.12

    steps:
      - checkout

      - run:
          name: Check Python Version
          command: python --version

      - run:
          name: Install Dependencies
          command: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt

      - run:
          name: Run Unit Tests
          command: pytest

workflows:
  python-workflow:
    jobs:
      - test-python
